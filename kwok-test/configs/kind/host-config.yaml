kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  podSubnet: 10.210.0.0/16
  serviceSubnet: 10.110.0.0/16
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 32443
        hostPort: 32443
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
          certSANs:
            - "127.0.0.1"
            - "localhost"
            - "192.168.1.69"
